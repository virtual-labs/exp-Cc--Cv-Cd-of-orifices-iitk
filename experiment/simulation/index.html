<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Experiment Page</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div class="heading">
    <h1>Fluid Mechanics Lab</h1>
  </div>
  <div class="container">
    <div class="header">
      To determine coefficient of discharge of orifice meter
    </div>

    <div class="content">

      <div class="left-section">
        <div class="instruction-header">
          <div class="instruction-box">
            Instruction
          </div>
        </div>
        <div class="step-container">
          <div id="step-text">Complete demonstration of setup with labelled diagram.</div>
          <div class="controls">
            <button id="next-btn">Next</button>
            <button id="submit-btn" style="display: none;">Submit</button>
            <button id="speaker-btn">🔊</button>
          </div>

        </div>
        <div id="left-result-table" style="display: none; margin-top: 20px;">
  <h3>Experiment Result</h3>
  <table border="1" cellpadding="5">
    <tr><td><strong>Time Taken</strong></td><td id="timeTakenLeft"></td></tr>
    <tr><td><strong>Discharge Q</strong></td><td id="qValueLeft"></td></tr>
    <tr><td><strong>Theoretical Qt</strong></td><td id="qtValueLeft"></td></tr>
    <tr><td><strong>Cd</strong></td><td id="cdValueLeft"></td></tr>
  </table>
</div>

      </div>
      <div class="right-section">
        <div class="image-wrapper">
          <img src="images/pipe2.png" alt="Pipe" class="pipe2">
          <img src="images/rotameter.png" alt="Rotameter" class="rotameter">
          <img src="images/tread.png" alt="Thread" class="thread">
          <div class="utube">
            <div class="utubeWater" id="utubeWater"></div>
          </div>
          <img src="images/pipe.png" alt="Pipe" class="pipes">
          <img src="images/motor.png" alt="Motor" class="motor">
          <button class="motor-btn" id="motorBtn"></button>
          <img src="images/sump-measurementTank.png" alt="Tank" class="tank">
          <div class="tapbtn">
            <div class="tab-label">Tab-btn</div>
            <button id="toggleBtn" class="tab-button red"></button>
          </div>
          <div class="measurement-container">
            <div class="waterlevel" id="waterlevel"></div>
          </div>
          <img src="images/ballvalve.png" alt="Ball" class="ball1">
          <img src="images/ballvalve.png" alt="Ball" class="ball2">
          <img src="images/ballvalve.png" alt="Ball" class="ball3">
          <img src="images/blue-valve.png" alt="Valve" class="valve1">
          <img src="images/blue-valve.png" alt="Valve" class="valve2">
          <div class="spacer"></div>

        </div>
      </div>
    </div>
  </div>
  <div class="clear-container">
    <button id="clearBtn" class="clear-btn">Reset Experiment</button>
  </div>
  <audio id="waterSound" loop>
    <source src="images/audio.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>
  <script src="js/script.js"></script>
</body>

</html>
